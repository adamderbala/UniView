<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <!-- background -->
  <rect width="64" height="64" rx="12" fill="white"></rect>

  <!-- parking grid -->
  <rect x="10" y="10" width="12" height="12" rx="2" fill="#22c55e"></rect>
  <rect x="26" y="10" width="12" height="12" rx="2" fill="#CC0033"></rect>
  <rect x="42" y="10" width="12" height="12" rx="2" fill="#22c55e"></rect>

  <rect x="10" y="26" width="12" height="12" rx="2" fill="#CC0033"></rect>
  <rect x="26" y="26" width="12" height="12" rx="2" fill="#f3f4f6"></rect>
  <rect x="42" y="26" width="12" height="12" rx="2" fill="#CC0033"></rect>

  <rect x="10" y="42" width="12" height="12" rx="2" fill="#22c55e"></rect>
  <rect x="26" y="42" width="12" height="12" rx="2" fill="#CC0033"></rect>
  <rect x="42" y="42" width="12" height="12" rx="2" fill="#22c55e"></rect>

  <!-- centered white badge -->
  <rect x="18" y="20" width="28" height="24" rx="7" fill="white" stroke="#e5e7eb" stroke-width="1.2"></rect>

  <!-- clip area for just the V -->
  <defs>
    <clipPath id="v-half">
      <rect x="32" y="20" width="14" height="24"></rect>
    </clipPath>
  </defs>

  <!-- full UV in black, naturally typed -->
  <text x="32" y="32" text-anchor="middle" dominant-baseline="central" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="black">UV</text>

  <!-- same UV overlaid in red, clipped so only V shows -->
  <text x="32" y="32" text-anchor="middle" dominant-baseline="central" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#CC0033" clip-path="url(#v-half)">UV</text>

</svg>